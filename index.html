<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>New Jeans Song Generator</title>
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="index.css" />
</head>

<body>
  <main id="app">
    <h1 id="colorfulTitle"></h1>
    <div id="coverContainer">
      <img id="trackCover" src="" alt="Album cover" />
      <img id="danielleSticker" src="graphics/Cd%20Danielle%20Sticker%20(1).gif" alt="Danielle sticker" />
    </div>
    <p id="trackName">No track selected</p>
    <div id="status" aria-live="polite" style="margin-top:8px;font-size:13px;opacity:0.9"></div>

    <div id="musicControls">
      <button id="playBtn">▶ Play</button>
      <button id="randomBtn">Randomize Song</button>
    </div>

    <audio id="myAudio" preload="auto"></audio>
  </main>

  <script>
    const pastelColors = [
      '#FFB3BA', '#FFCCCB', '#FFDFBA', '#FFFFBA', '#BAFFC9',
      '#BAE1FF', '#E0BBE4', '#D5AAFF', '#FFC8DD', '#B5EAD7',
      '#C1FFD7', '#FFE5B4', '#FFDAB9', '#FFB6C1', '#DDA0DD'
    ];

    function getRandomPastelColor() {
      return pastelColors[Math.floor(Math.random() * pastelColors.length)];
    }

    function colorizeTitle() {
      const title = 'New Jeans Song Generator';
      const titleEl = document.getElementById('colorfulTitle');
      titleEl.innerHTML = '';
      
      for (let char of title) {
        const span = document.createElement('span');
        span.textContent = char;
        span.style.color = getRandomPastelColor();
        titleEl.appendChild(span);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', colorizeTitle);
    } else {
      colorizeTitle();
    }
  </script>
  <script src="index.js"></script>
</body>

</html>
