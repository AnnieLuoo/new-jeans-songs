<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>New Jeans Song Generator</title>
  <link rel="icon" href="graphics/new%20jeans%20bape.jpg" />
  <link rel="stylesheet" href="index.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet" />
</head>
<body>
  <main id="app">
    <h1 id="colorfulTitle">New Jeans</h1>
    <div id="coverContainer">
      <img id="trackCover" src="" alt="Album cover" />
      <img id="danielleSticker" src="graphics/spinning%20cd.gif" alt="Danielle sticker" />
    </div>
    <p id="trackName">No track selected</p>
    <div id="status" aria-live="polite" style="margin-top:8px;font-size:13px;opacity:0.9"></div>
    <div id="musicControls">
      <button id="playBtn">▶ Play</button>
      <button id="randomBtn">Randomize Song</button>
    </div>
    <audio id="myAudio" preload="auto"></audio>
  </main>
  <button id="sidebarToggle" aria-label="Toggle song list">♪</button>
  <div id="sidebarOverlay"></div>
  <nav id="sidebar">
    <h2>Songs Avaliable</h2>
    <div id="sidebarList"></div>
  </nav>
  <script src="index.js"></script>
</body>
</html>
